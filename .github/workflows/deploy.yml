name: Deploy Pages

on:
  push:
    paths: ['data/**']
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jinja2
      - run: python build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - id: deploy
        uses: actions/deploy-pages@v4
