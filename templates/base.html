<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Y-Offline{% endblock %}</title>
    <link rel="stylesheet" href="{{ base }}static/style.css">
</head>
<body>
    <nav>
        {% block nav %}{% endblock %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        {% block footer %}
        <p>Generated by <a href="https://github.com/CuSO4Deposit/yoffline-pages">yoffline-pages</a></p>
        {% endblock %}
    </footer>
    <script>
    function timeAgo(ts){var d=Math.floor(Date.now()/1000)-ts;if(d<60)return d+"s ago";if(d<3600)return Math.floor(d/60)+"m ago";if(d<86400)return Math.floor(d/3600)+"h ago";return Math.floor(d/86400)+"d ago"}
    document.querySelectorAll("[data-time]").forEach(function(el){el.textContent+=timeAgo(+el.dataset.time)});
    </script>
</body>
</html>
